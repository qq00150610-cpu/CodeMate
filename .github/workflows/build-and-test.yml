# =============================================================================
# CodeMate Build Workflow with Signing
# =============================================================================

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.19.0'

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/codemate.keystore
          else
            echo "No keystore secret found, creating debug keystore..."
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
          fi

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            cat > android/keystore.properties << EOF
          storeFile=codemate.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEYSTORE_PASSWORD
          EOF
          fi

      - name: Build Release APK
        run: |
          flutter build apk --release --split-per-abi=false || flutter build apk --release || flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codemate-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date +%Y.%m.%d.%H%M)
          APK_FILE=$(ls build/app/outputs/flutter-apk/*.apk | head -1)
          gh release create "v$VERSION" "$APK_FILE" --title "CodeMate v$VERSION" --notes "Automated build" || echo "Release creation skipped"
