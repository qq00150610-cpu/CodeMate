# =============================================================================
# CodeMate Build Workflow
# =============================================================================

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.19.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: List APK files
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codemate-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(date +%Y.%m.%d.%H%M)
          APK_FILE=$(ls build/app/outputs/flutter-apk/*.apk | head -1)
          gh release create "v$VERSION" "$APK_FILE" --title "CodeMate Debug v$VERSION" --notes "Automated debug build" || echo "Release creation skipped"
