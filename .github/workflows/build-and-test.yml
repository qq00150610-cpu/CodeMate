# =============================================================================
# CodeMate Build Workflow
# =============================================================================

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.24.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        id: build
        run: |
          flutter build apk --debug 2>&1 | tee build.log
          echo "Build exit code: $?"
          
      - name: Find APK files
        if: always()
        run: |
          echo "=== Finding APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== Listing build outputs ==="
          ls -laR build/app/outputs/ 2>/dev/null || echo "No outputs directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codemate-debug-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
            **/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7
