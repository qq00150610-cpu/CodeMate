# =============================================================================
# CodeMate Release 自动发布工作流
# =============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        type: string
      prerelease:
        description: '预发布版本'
        required: false
        default: 'false'
        type: boolean
      changelog:
        description: '更新日志'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.16.0'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/codemate.keystore

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=codemate.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEYSTORE_PASSWORD
          EOF

      - name: Build Release APK
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CodeMate-${{ github.event.inputs.version || '1.0.0' }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeMate-APK
          path: build/app/outputs/flutter-apk/CodeMate-*.apk
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: CodeMate-APK
          path: ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: CodeMate v${{ github.event.inputs.version }}
          body: |
            ## CodeMate v${{ github.event.inputs.version }}
            
            ${{ github.event.inputs.changelog }}
            
            ### 功能特性
            - 🤖 AI 助手（阿里云百炼通义千问）
            - 🔐 后端服务（API Key 安全管理）
            - ⚡ 性能优化（冷启动加速、内存管理）
            - 📦 项目模板系统
            - 🔄 自动更新机制
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
