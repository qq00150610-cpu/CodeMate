// =============================================================================
// CodeMate 项目级 build.gradle
// =============================================================================
// Flutter 项目配置文件，包含 SDK 版本、插件、依赖等配置
// =============================================================================

// Flutter 插件配置
plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.17.1" apply false
}

// Android Gradle 插件配置
buildscript {
    ext.kotlin_version = '1.9.22'
    
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        
        // Google Services 插件（可选）
        // classpath 'com.google.gms:google-services:4.4.0'
    }
}

// 全局仓库配置
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
        maven { url 'https://maven.google.com' }
    }
}

// 根项目配置
rootProject.buildDir = "../build"

// 清理任务配置
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    
    // 依赖清理（避免重复依赖警告）
    project.configurations.all {
        resolutionStrategy {
            // 强制使用指定版本的依赖
            force 'androidx.core:core:1.12.0'
            force 'androidx.appcompat:appcompat:1.6.1'
            force 'com.google.android.material:material:1.11.0'
        }
    }
}

// 清理任务
tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// 任务执行顺序
flutter {
    tasks.configureEach { task ->
        task.dependsOn(":flutter:packagesGet")
    }
}
