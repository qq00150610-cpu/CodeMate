name: codemate
description: "CodeMate - Android IDE with AI Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebView
  flutter_inappwebview: ^6.0.0
  
  # Markdown
  flutter_markdown: ^0.6.18
  
  # State management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Permissions
  permission_handler: ^11.1.0
  
  # HTTP
  http: ^1.1.0
  
  # Device info
  device_info_plus: ^9.0.0
  
  # Downloader
  flutter_downloader: ^1.11.0
  
  # Utils
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/codemate_bridge.js
