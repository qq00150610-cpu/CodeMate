# pubspec.yaml - CodeMate Flutter 依赖配置

name: codemate
description: "CodeMate - Android IDE with AI Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebView 支持
  flutter_inappwebview: ^6.0.0
  
  # Markdown 渲染（支持 AI 响应展示）
  flutter_markdown: ^0.6.18
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 权限处理
  permission_handler: ^11.1.0
  
  # 工具类
  collection: ^1.18.0
  
  # 文件路径
  path_provider: ^2.1.1
  
  # 设备信息
  device_info_plus: ^9.1.1
  
  # 下载管理
  flutter_downloader: ^1.11.4
  
  # HTTP 请求
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/codemate_bridge.js
  
  # fonts 配置已移除，如需使用 RobotoMono，请使用 google_fonts 包
